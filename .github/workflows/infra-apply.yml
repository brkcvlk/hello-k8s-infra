name: infra-apply

on:
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/**"

permissions:
  contents: read

concurrency:
  group: terraform-apply-main
  cancel-in-progress: false

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: terraform fmt check
        run: make fmt-check

  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Copy backend config
        env:
          BACKEND_HCL: ${{ secrets.BACKEND_HCL }}
        run: echo "$BACKEND_HCL" > backend.hcl

      - name: terraform init
        run: make init

      - name: terraform validate
        run: make validate

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Copy backend config
        env:
          BACKEND_HCL: ${{ secrets.BACKEND_HCL }}
        run: echo "$BACKEND_HCL" > backend.hcl

      - name: terraform init
        run: make init

      - name: terraform plan
        run: make plan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infra/tfplan
          retention-days: 1

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Copy backend config
        env:
          BACKEND_HCL: ${{ secrets.BACKEND_HCL }}
        run: echo "$BACKEND_HCL" > backend.hcl

      - name: terraform init
        run: make init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: infra/

      - name: terraform apply
        run: make apply